name: Bug Report
description: Report a bug in Tektii Gateway
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Gateway version
      description: Output of the Docker image tag or Cargo.toml version.
      placeholder: "v0.1.0"
    validations:
      required: true
  - type: dropdown
    id: broker
    attributes:
      label: Broker adapter
      options:
        - Alpaca
        - Binance
        - Oanda
        - Saxo
        - Tektii
        - N/A
    validations:
      required: true
