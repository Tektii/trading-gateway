name: Bug Report
description: Report a bug in Trading Gateway
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Gateway version
      description: Output of the Docker image tag or Cargo.toml version.
      placeholder: "v0.1.0"
    validations:
      required: true
  - type: dropdown
    id: broker
    attributes:
      label: Broker adapter
      options:
        - Alpaca
        - Binance
        - Oanda
        - Saxo
        - Tektii
        - Mock
        - N/A
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: How are you running the gateway?
      options:
        - Docker
        - Docker Compose
        - Built from source
        - Other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 14.5 ARM, Ubuntu 24.04 x86_64"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant log output. Please redact any credentials.
      render: shell
    validations:
      required: false
