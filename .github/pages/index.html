<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tektii Trading Gateway — API Reference</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/redoc@2.4.0/bundles/redoc.standalone.min.css"
    />
  </head>
  <body>
    <div id="redoc-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/redoc@2.4.0/bundles/redoc.standalone.min.js"></script>
    <script>
      Redoc.init("./openapi.json", {
        scrollYOffset: 0,
        hideDownloadButton: false,
        expandResponses: "200",
        theme: {
          colors: { primary: { main: "#1a73e8" } },
          typography: { fontSize: "15px" },
        },
      }, document.getElementById("redoc-container"));
    </script>
  </body>
</html>
