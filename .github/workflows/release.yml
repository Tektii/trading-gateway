name: Release

on:
  push:
    tags: ["v*.*.*"]

# Permissions set per-job (least privilege).

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: tektii/gateway

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # Never cancel a release mid-flight

jobs:
  # ===========================================================================
  # 1. Validate tag matches Cargo.toml and resolve main-built image digests.
  #
  # Images are built by docker-publish.yml on every push to main. This job
  # looks them up by the immutable `sha-<short>` tag — not `latest`, which is
  # a floating ref — so the release ships exactly the code at the tagged
  # commit even if main advances before this workflow finishes.
  #
  # Polls for up to 30 minutes because a fresh main push may still be
  # building when the tag push arrives.
  # ===========================================================================
  validate:
    name: Validate & Resolve
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      debian_digest: ${{ steps.digests.outputs.debian_digest }}
      slim_digest: ${{ steps.digests.outputs.slim_digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep -A5 '^\[workspace\.package\]' Cargo.toml | grep '^version' | sed -E 's/^version[[:space:]]*=[[:space:]]*"([^"]*)".*/\1/')

          echo "Tag version:   $TAG_VERSION"
          echo "Cargo version: $CARGO_VERSION"

          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch: tag is v${TAG_VERSION} but Cargo.toml has ${CARGO_VERSION}"
            exit 1
          fi

          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image digests
        id: digests
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          DEBIAN_TAG="${REGISTRY}/${IMAGE_NAME}:sha-${SHORT_SHA}"
          SLIM_TAG="${REGISTRY}/${IMAGE_NAME}:sha-${SHORT_SHA}-slim"

          echo "Looking up:"
          echo "  $DEBIAN_TAG"
          echo "  $SLIM_TAG"

          # Poll for up to 30 minutes. Main multi-arch builds take ~20 min.
          for i in $(seq 1 60); do
            if docker buildx imagetools inspect "$DEBIAN_TAG" > /dev/null 2>&1 \
               && docker buildx imagetools inspect "$SLIM_TAG" > /dev/null 2>&1; then
              echo "Images found after $((i * 30))s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Images ${DEBIAN_TAG} / ${SLIM_TAG} not found after 30 minutes. Did docker-publish.yml run for this commit?"
              exit 1
            fi
            echo "Waiting for images... ($i/60)"
            sleep 30
          done

          DEBIAN_DIGEST=$(docker buildx imagetools inspect "$DEBIAN_TAG" --format '{{.Manifest.Digest}}')
          SLIM_DIGEST=$(docker buildx imagetools inspect "$SLIM_TAG" --format '{{.Manifest.Digest}}')

          echo "Debian:     $DEBIAN_DIGEST"
          echo "Distroless: $SLIM_DIGEST"

          echo "debian_digest=$DEBIAN_DIGEST" >> "$GITHUB_OUTPUT"
          echo "slim_digest=$SLIM_DIGEST" >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # 2. Promote the main-built images to their versioned tags.
  #
  # `docker buildx imagetools create` retags the multi-arch manifest at the
  # resolved digest — no rebuild, no platform drift. The release ships exactly
  # the bits that main built.
  #
  # Releases are intentionally NOT gated on broker-sandbox smoke tests.
  # `publish` only retags digests that docker-publish.yml already built and
  # published when the commit merged to main, so a pre-publish gate would guard
  # bits that are already live. A broker-smoke gate would also couple every
  # release to four third-party broker sandboxes and their (often expiring)
  # credentials. Provider conformance is tracked as a separate increment, not
  # on the release path.
  # ===========================================================================
  publish:
    name: Publish Images
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag versioned images
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          IMAGE="${REGISTRY}/${IMAGE_NAME}"

          docker buildx imagetools create \
            --tag "${IMAGE}:${VERSION}" \
            "${IMAGE}@${{ needs.validate.outputs.debian_digest }}"

          docker buildx imagetools create \
            --tag "${IMAGE}:${VERSION}-slim" \
            "${IMAGE}@${{ needs.validate.outputs.slim_digest }}"

  # The GitHub Release itself is created by release-please when the Release PR
  # merges (see release-please.yml). That's what pushed the tag this workflow
  # is reacting to, so by the time we get here the release page already exists.
