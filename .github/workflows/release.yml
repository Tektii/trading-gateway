name: Release

on:
  push:
    tags: ["v*.*.*"]

# Permissions set per-job (least privilege).

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: tektii/gateway

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # Never cancel a release mid-flight

jobs:
  # ===========================================================================
  # 1. Validate tag matches Cargo.toml and resolve main-built image digests.
  #
  # Images are built by docker-publish.yml on every push to main. This job
  # looks them up by the immutable `sha-<short>` tag — not `latest`, which is
  # a floating ref — so the release ships exactly the code at the tagged
  # commit even if main advances before this workflow finishes.
  #
  # Polls for up to 30 minutes because a fresh main push may still be
  # building when the tag push arrives.
  # ===========================================================================
  validate:
    name: Validate & Resolve
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      debian_digest: ${{ steps.digests.outputs.debian_digest }}
      slim_digest: ${{ steps.digests.outputs.slim_digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep -A5 '^\[workspace\.package\]' Cargo.toml | grep '^version' | sed 's/.*"\(.*\)"/\1/')

          echo "Tag version:   $TAG_VERSION"
          echo "Cargo version: $CARGO_VERSION"

          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch: tag is v${TAG_VERSION} but Cargo.toml has ${CARGO_VERSION}"
            exit 1
          fi

          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image digests
        id: digests
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          DEBIAN_TAG="${REGISTRY}/${IMAGE_NAME}:sha-${SHORT_SHA}"
          SLIM_TAG="${REGISTRY}/${IMAGE_NAME}:sha-${SHORT_SHA}-slim"

          echo "Looking up:"
          echo "  $DEBIAN_TAG"
          echo "  $SLIM_TAG"

          # Poll for up to 30 minutes. Main multi-arch builds take ~20 min.
          for i in $(seq 1 60); do
            if docker buildx imagetools inspect "$DEBIAN_TAG" > /dev/null 2>&1 \
               && docker buildx imagetools inspect "$SLIM_TAG" > /dev/null 2>&1; then
              echo "Images found after $((i * 30))s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Images ${DEBIAN_TAG} / ${SLIM_TAG} not found after 30 minutes. Did docker-publish.yml run for this commit?"
              exit 1
            fi
            echo "Waiting for images... ($i/60)"
            sleep 30
          done

          DEBIAN_DIGEST=$(docker buildx imagetools inspect "$DEBIAN_TAG" --format '{{.Manifest.Digest}}')
          SLIM_DIGEST=$(docker buildx imagetools inspect "$SLIM_TAG" --format '{{.Manifest.Digest}}')

          echo "Debian:     $DEBIAN_DIGEST"
          echo "Distroless: $SLIM_DIGEST"

          echo "debian_digest=$DEBIAN_DIGEST" >> "$GITHUB_OUTPUT"
          echo "slim_digest=$SLIM_DIGEST" >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # 2. Smoke test the pinned image against each adapter's broker sandbox.
  #
  # Every adapter MUST have its SMOKE_* secret configured. If a secret is
  # missing the job fails, blocking the release. This is intentional — we
  # never publish an image that hasn't been validated against all adapters.
  # ===========================================================================
  smoke-test:
    name: "Smoke Test (${{ matrix.adapter }})"
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - adapter: alpaca
            secret_name: SMOKE_ALPACA
            symbol: AAPL
            order_test: "1"
            order_qty: "1"
            order_price: "1.00"
          - adapter: binance
            secret_name: SMOKE_BINANCE
            symbol: BTCUSDT
            order_test: "1"
            order_qty: "0.001"
            order_price: "1000.00"
          - adapter: oanda
            secret_name: SMOKE_OANDA
            symbol: EUR_USD
            order_test: "1"
            order_qty: "1"
            order_price: "0.50000"
          - adapter: saxo
            secret_name: SMOKE_SAXO
            symbol: EURUSD:FXSPOT
            order_test: "0"
            order_qty: "1"
            order_price: "0.50000"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.validate.outputs.debian_digest }}"
          docker pull "$IMAGE_REF"
          docker tag "$IMAGE_REF" tektii/gateway:smoke

      - name: Install k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6=1.0.0

      - name: Write env file
        env:
          # Each adapter's secrets are stored as a single JSON secret: SMOKE_ALPACA, SMOKE_BINANCE, etc.
          # The JSON object contains key=value pairs that become env vars.
          # Example: {"ALPACA_API_KEY":"pk-xxx","ALPACA_API_SECRET":"sk-xxx"}
          ADAPTER_SECRET: ${{ secrets[matrix.secret_name] }}
        run: |
          if [ -z "$ADAPTER_SECRET" ]; then
            echo "::error::Secret ${{ matrix.secret_name }} is not configured. All adapter secrets are required for release."
            exit 1
          fi

          # Write as individual -e flags to handle values with special characters.
          echo "$ADAPTER_SECRET" | jq -r 'to_entries[] | "-e\n\(.key)=\(.value)"' > /tmp/adapter-docker-args.txt

      - name: Start gateway
        run: |
          # shellcheck disable=SC2046
          docker run -d \
            --name gateway-smoke \
            $(cat /tmp/adapter-docker-args.txt | xargs) \
            -e GATEWAY_HOST=0.0.0.0 \
            -e RUST_LOG=warn,tektii_gateway=info \
            -p 18080:8080 \
            --read-only \
            --tmpfs /tmp \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            tektii/gateway:smoke

      - name: Wait for ready
        run: |
          echo "Waiting for gateway to become ready..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:18080/readyz > /dev/null 2>&1; then
              echo "Gateway ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Gateway did not become ready within 60s"
          docker logs gateway-smoke
          exit 1

      - name: Run smoke tests
        run: |
          k6 run smoke-tests/smoke.js \
            --env GATEWAY_URL=http://localhost:18080 \
            --env SMOKE_TEST_SYMBOL=${{ matrix.symbol }} \
            --env SMOKE_TEST_ORDER=${{ matrix.order_test }} \
            --env SMOKE_ORDER_QTY=${{ matrix.order_qty }} \
            --env SMOKE_ORDER_PRICE=${{ matrix.order_price }}

      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: smoke-results-${{ matrix.adapter }}
          path: smoke-results.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Gateway logs
        if: failure()
        run: docker logs gateway-smoke

      - name: Cleanup
        if: always()
        run: docker rm -f gateway-smoke 2>/dev/null || true

  # ===========================================================================
  # 3. Promote the smoke-tested images to their versioned tags.
  #
  # `docker buildx imagetools create` retags the multi-arch manifest at the
  # resolved digest — no rebuild, no platform drift. The release ships
  # exactly the bits that main built.
  # ===========================================================================
  publish:
    name: Publish Images
    needs: [validate, smoke-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag versioned images
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          IMAGE="${REGISTRY}/${IMAGE_NAME}"

          docker buildx imagetools create \
            --tag "${IMAGE}:${VERSION}" \
            "${IMAGE}@${{ needs.validate.outputs.debian_digest }}"

          docker buildx imagetools create \
            --tag "${IMAGE}:${VERSION}-slim" \
            "${IMAGE}@${{ needs.validate.outputs.slim_digest }}"

  # ===========================================================================
  # 4. Create GitHub Release (only after images are tagged)
  # ===========================================================================
  release:
    name: Create Release
    needs: [validate, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          name: v${{ needs.validate.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ startsWith(needs.validate.outputs.version, '0.') }}
