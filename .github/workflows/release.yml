name: Release

on:
  push:
    tags: ["v*.*.*"]

# Permissions set per-job (least privilege).

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: tektii/gateway

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # Never cancel a release mid-flight

jobs:
  # ===========================================================================
  # 1. Validate that the git tag matches Cargo.toml version
  # ===========================================================================
  validate:
    name: Validate Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_date: ${{ steps.date.outputs.build_date }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep -A5 '^\[workspace\.package\]' Cargo.toml | grep '^version' | sed 's/.*"\(.*\)"/\1/')

          echo "Tag version:   $TAG_VERSION"
          echo "Cargo version: $CARGO_VERSION"

          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch: tag is v${TAG_VERSION} but Cargo.toml has ${CARGO_VERSION}"
            exit 1
          fi

          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set build date
        id: date
        run: echo "build_date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # 2. Build amd64 image for smoke testing (not pushed — loaded locally)
  # ===========================================================================
  build-smoke-image:
    name: Build Smoke Image
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

      - name: Build image
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: tektii/gateway:smoke
          platforms: linux/amd64
          build-args: |
            BASE=debian
            BUILD_DATE=${{ needs.validate.outputs.build_date }}
            GIT_SHA=${{ github.sha }}
            VERSION=${{ needs.validate.outputs.version }}
          cache-from: type=gha,scope=smoke
          cache-to: type=gha,mode=max,scope=smoke

      - name: Save image
        run: docker save tektii/gateway:smoke | gzip > /tmp/gateway-smoke.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gateway-smoke-image
          path: /tmp/gateway-smoke.tar.gz
          retention-days: 1

  # ===========================================================================
  # 3. Smoke test each adapter against real broker sandboxes
  #
  # Every adapter MUST have its SMOKE_* secret configured. If a secret is
  # missing the job fails, blocking the release. This is intentional — we
  # never publish an image that hasn't been validated against all adapters.
  # ===========================================================================
  smoke-test:
    name: "Smoke Test (${{ matrix.adapter }})"
    needs: build-smoke-image
    runs-on: ubuntu-latest
    permissions: {} # No permissions needed
    strategy:
      fail-fast: false
      matrix:
        include:
          - adapter: alpaca
            secret_name: SMOKE_ALPACA
            symbol: AAPL
            order_test: "1"
            order_qty: "1"
            order_price: "1.00"
          - adapter: binance
            secret_name: SMOKE_BINANCE
            symbol: BTCUSDT
            order_test: "1"
            order_qty: "0.001"
            order_price: "1000.00"
          - adapter: oanda
            secret_name: SMOKE_OANDA
            symbol: EUR_USD
            order_test: "1"
            order_qty: "1"
            order_price: "0.50000"
          - adapter: saxo
            secret_name: SMOKE_SAXO
            symbol: EURUSD:FXSPOT
            order_test: "0"
            order_qty: "1"
            order_price: "0.50000"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: gateway-smoke-image
          path: /tmp

      - name: Load image
        run: gunzip -c /tmp/gateway-smoke.tar.gz | docker load

      - name: Install k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6=1.0.0

      - name: Write env file
        env:
          # Each adapter's secrets are stored as a single JSON secret: SMOKE_ALPACA, SMOKE_BINANCE, etc.
          # The JSON object contains key=value pairs that become env vars.
          # Example: {"ALPACA_API_KEY":"pk-xxx","ALPACA_API_SECRET":"sk-xxx"}
          ADAPTER_SECRET: ${{ secrets[matrix.secret_name] }}
        run: |
          if [ -z "$ADAPTER_SECRET" ]; then
            echo "::error::Secret ${{ matrix.secret_name }} is not configured. All adapter secrets are required for release."
            exit 1
          fi

          # Write as individual -e flags to handle values with special characters.
          echo "$ADAPTER_SECRET" | jq -r 'to_entries[] | "-e\n\(.key)=\(.value)"' > /tmp/adapter-docker-args.txt

      - name: Start gateway
        run: |
          # shellcheck disable=SC2046
          docker run -d \
            --name gateway-smoke \
            $(cat /tmp/adapter-docker-args.txt | xargs) \
            -e GATEWAY_HOST=0.0.0.0 \
            -e RUST_LOG=warn,tektii_gateway=info \
            -p 18080:8080 \
            --read-only \
            --tmpfs /tmp \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            tektii/gateway:smoke

      - name: Wait for ready
        run: |
          echo "Waiting for gateway to become ready..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:18080/readyz > /dev/null 2>&1; then
              echo "Gateway ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Gateway did not become ready within 60s"
          docker logs gateway-smoke
          exit 1

      - name: Run smoke tests
        run: |
          k6 run smoke-tests/smoke.js \
            --env GATEWAY_URL=http://localhost:18080 \
            --env SMOKE_TEST_SYMBOL=${{ matrix.symbol }} \
            --env SMOKE_TEST_ORDER=${{ matrix.order_test }} \
            --env SMOKE_ORDER_QTY=${{ matrix.order_qty }} \
            --env SMOKE_ORDER_PRICE=${{ matrix.order_price }}

      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: smoke-results-${{ matrix.adapter }}
          path: smoke-results.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Gateway logs
        if: failure()
        run: docker logs gateway-smoke

      - name: Cleanup
        if: always()
        run: docker rm -f gateway-smoke 2>/dev/null || true

  # ===========================================================================
  # 4. Publish Docker images (only after smoke tests pass)
  # ===========================================================================
  publish:
    name: Publish Images
    needs: [validate, smoke-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Debian image ---
      - name: Docker metadata (debian)
        id: meta-debian
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}

      - name: Build & push (debian)
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-debian.outputs.tags }}
          labels: ${{ steps.meta-debian.outputs.labels }}
          build-args: |
            BASE=debian
            BUILD_DATE=${{ needs.validate.outputs.build_date }}
            GIT_SHA=${{ github.sha }}
            VERSION=${{ needs.validate.outputs.version }}
          cache-from: type=gha,scope=ghcr
          cache-to: type=gha,mode=max,scope=ghcr

      # --- Distroless image ---
      - name: Docker metadata (distroless)
        id: meta-slim
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},suffix=-slim

      - name: Build & push (distroless)
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-slim.outputs.tags }}
          labels: ${{ steps.meta-slim.outputs.labels }}
          build-args: |
            BASE=distroless
            BUILD_DATE=${{ needs.validate.outputs.build_date }}
            GIT_SHA=${{ github.sha }}
            VERSION=${{ needs.validate.outputs.version }}
          cache-from: type=gha,scope=ghcr
          cache-to: type=gha,mode=max,scope=ghcr

  # ===========================================================================
  # 5. Create GitHub Release (only after images are published)
  # ===========================================================================
  release:
    name: Create Release
    needs: [validate, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          name: v${{ needs.validate.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ startsWith(needs.validate.outputs.version, '0.') }}
