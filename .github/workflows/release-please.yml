name: Release Please

on:
  push:
    branches: [main]

# Maintains a perpetually-open "Release PR" that bumps the workspace version
# and updates CHANGELOG.md based on Conventional Commits accumulated since the
# last release. Merging the Release PR pushes a `vX.Y.Z` tag, which triggers
# release.yml to promote the main-built images to their versioned tags.
#
# Authenticates as an org-owned GitHub App ("Tektii Release Bot") rather than
# GITHUB_TOKEN. The Tektii org enforces "Actions cannot create or approve pull
# requests" at org level, which the default GITHUB_TOKEN inherits; an App
# installation token is a separate identity not bound by that toggle, so
# release-please can open its Release PR. The App is granted only
# Contents: write + Pull requests: write, and create-github-app-token mints a
# short-lived token scoped to this repo on each run — the only stored
# credential is the App's private key, held as an org secret and not bound to
# any person. Using the App identity (not GITHUB_TOKEN) also lets the release
# tag it creates trigger release.yml's publish job.
#
# Required config (both org secrets): RELEASE_BOT_APP_ID (the App's numeric ID)
# and RELEASE_BOT_APP_KEY (the App's PEM private key).

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions: {} # Auth is via the App token, not GITHUB_TOKEN
    steps:
      - name: Mint a GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_APP_KEY }}

      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # ---------------------------------------------------------------------------
      # Sync Cargo.lock on the Release PR.
      #
      # We use release-type `simple` (the `rust` type breaks on workspace members
      # that inherit `version.workspace = true` — see release-please-config.json
      # and PR #27). `simple` only string-substitutes the version literal in
      # Cargo.toml, so Cargo.lock's workspace-member entries lag the bump until the
      # next `cargo` resolve. These steps regenerate the lockfile on the Release PR
      # branch so the merged release commit ships a consistent Cargo.lock.
      #
      # `cargo update --workspace` relocks only the workspace members (the 10
      # tektii-* crates), not transitive dependencies, so the diff is exactly the
      # version bump and nothing else. Pushing with the App token (not
      # GITHUB_TOKEN) lets CI re-run on the PR; the push targets the PR branch,
      # never main, so it does not re-trigger this workflow.
      # ---------------------------------------------------------------------------
      - name: Check out the Release PR branch
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Rust
        if: ${{ steps.release.outputs.pr }}
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable

      - name: Regenerate and commit Cargo.lock
        if: ${{ steps.release.outputs.pr }}
        run: |
          cargo update --workspace
          if git diff --quiet -- Cargo.lock; then
            echo "Cargo.lock already in sync — nothing to commit."
            exit 0
          fi
          git config user.name "tektii-release-bot"
          git config user.email "oss@tektii.com"
          git add Cargo.lock
          git commit -m "chore: sync Cargo.lock with release version"
          git push
