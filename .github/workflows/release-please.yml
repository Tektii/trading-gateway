name: Release Please

on:
  push:
    branches: [main]

# Maintains a perpetually-open "Release PR" that bumps the workspace version
# and updates CHANGELOG.md based on Conventional Commits accumulated since the
# last release. Merging the Release PR pushes a `vX.Y.Z` tag, which triggers
# release.yml to smoke-test and promote the main-built images.
#
# Authenticates via a scoped fine-grained PAT (RELEASE_PLEASE_TOKEN) rather
# than GITHUB_TOKEN. The Tektii org enforces "Actions cannot create or
# approve pull requests" at org level, which the default GITHUB_TOKEN
# inherits. The PAT is scoped to this repo with `contents: write` +
# `pull-requests: write` only, so it does not bypass the org policy
# globally — only release-please gets elevated rights, and only here.

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions: {} # All API calls go through RELEASE_PLEASE_TOKEN
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
